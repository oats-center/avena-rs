# Local edge NATS leaf node for Avena RS boxes.
#
# Generated by shared/render-edge-config.py from shared/edge-box.config.json.
# Edit shared/edge-box.config.json, then rerun the renderer.

server_name: "i69-mu2-leaf"
listen: "127.0.0.1:4222"
http: "127.0.0.1:8222"

jetstream {
  store_dir: "/var/lib/nats/jetstream"
  domain: "edge-i69-mu2"
}

leafnodes {
  remotes = [
    {
      urls: [
        "nats://nats1.oats:7422"
        "nats://nats2.oats:7422"
        "nats://nats3.oats:7422"
      ]
      credentials: "/etc/nats/creds/leaf.creds"
    }
  ]
}
